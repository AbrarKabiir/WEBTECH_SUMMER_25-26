        .card {
            position: relative;
            width: 250px;
            padding: 15px;
            background-color: aliceblue;
            border-radius: 20px;
            margin: 40px auto;

            box-shadow: 5px 5px 10px gray;
        }

        #badge {
            position: absolute;
            top: 10px;
            right: 10px;

            background-color: green;
            color: white;
            padding: 5px;
            border-radius: 10px;
        }

        .card img {
            position: relative;
            top: 20px;
            border-radius: 50px;
        }

    </style>
</head>
