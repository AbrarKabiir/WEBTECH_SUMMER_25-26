<!DOCTYPE html>
<html>
<head>
    <title>Photo Gallery</title>

    <style>

        body{
            font-family: Arial, sans-serif;
        }

        h1{
            text-align: center;
        }

        #container{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 150px 150px;
            gap: 10px;
        }

        #b1 {
            grid-column: 1 / 3;
        }
        
        #b2 {
            grid-row: 1 / 3;
        }

        .box{
            background-color: lightblue;
            border: 2px solid black;
            text-align: center;
            line-height: 150px;
        }

        .box:hover{
            background-color: lightgreen;
        }

    </style>
</head>

<body>

    <h1>Photo Gallery</h1>

    <div id="container">

        <div class="box" id="b1">Photo 1</div>
        <div class="box" id="b2">Photo 2</div>
        <div class="box" id="b3">Photo 3</div>
        <div class="box" id="b4">Photo 4</div>
        <div class="box" id="b5">Photo 5</div>
        <div class="box" id="b6">Photo 6</div>

    </div>

</body>
</html>
