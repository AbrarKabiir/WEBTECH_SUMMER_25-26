<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Navbar</title>
    <style>
        body {
            margin: 0;
        }


        #nav {
            background-color: aqua;
            width: 100%;
            text-align: center;
        }

        nav a {
            display: inline-block;
            padding: 20px;
            margin: 20px;
            text-decoration: none;
            color: black;
        }

        nav a:hover {
            background-color: black;
            color:white;
        }

    </style>
</head>

<body>
    <nav id="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
    
</body>

</html>
