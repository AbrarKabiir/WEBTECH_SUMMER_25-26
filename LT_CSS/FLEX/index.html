<!DOCTYPE html>
<html lang="en">
<head>
    <title>FLEX CSS</title>

    <style>

        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        #container {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }

        .card {
            width: 200px;
            border: 2px solid black;
            background-color: lightblue;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .card:hover {
            background-color: lightgreen;
        }

        .card a {
            text-decoration: none;
        }

    </style>
    
</head>

<body>
    <h1>Student Dashboard</h1>

    <div id="container">

        <div class="card">
            <h2>Profile</h2>
            <p>View your personal information.</p>
            <a href="#">View Details</a>
        </div>

        <div class="card">
            <h2>Courses</h2>
            <p>See your enrolled courses.</p>
            <a href="#">View Details</a>
        </div>

        <div class="card">
            <h2>Assignments</h2>
            <p>Check your assignments.</p>
            <a href="#">View Details</a>
        </div>

        <div class="card">
            <h2>Results</h2>
            <p>View your exam results.</p>
            <a href="#">View Details</a>
        </div>

    </div>

</body>

</html>
