<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>

    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
            position: relative;
        }

        .box {
            width: 300px;
            height: 200px;
            position: absolute;
            color: blue;
            text-align: center;
            line-height: 200px;
            font-size: 20px;
        }

        #b1 {
            background-color: blueviolet;
            top: 50px;
            left: 50px;
            z-index: 1;
        }

        #b2 {
            background-color: chartreuse;
            top: 90px;
            left: 90px;
            z-index: 2;
        }

        #b3 {
            background-color: rgb(173, 38, 121);
            top: 130px;
            left: 130px;
            z-index: 3;
        } 

    </style>

</head>

<body>

    <div class="box" id="b1">
        BOX1
    </div>

    <div class="box" id="b2">
        BOX2
    </div>

    <div class="box" id="b3">
        BOX3
    </div>

</body>

</html>
