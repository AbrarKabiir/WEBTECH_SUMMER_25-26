<!DOCTYPE html>
<html>
<head>
    <title>University Admission Form</title>
</head>

<body>

    <h1>University Admission Form</h1>

    <form>

        <fieldset>
            <legend>Personal Information</legend>

            <label>Full Name:</label><br>
            <input type="text" name="fullname" maxlength="50" required>
            <br><br>

            <label>Email:</label><br>
            <input type="email" name="email" required>
            <br><br>

            <label>Date of Birth:</label><br>
            <input type="date" name="dob" required>
            <br><br>

            <label>Gender:</label><br>

            <input type="radio" name="gender" value="Male" required>
            Male

            <input type="radio" name="gender" value="Female">
            Female

            <input type="radio" name="gender" value="Other">
            Other

            <br><br>

            <label>Address:</label><br>
            <input type="text" name="address" maxlength="100" required>

        </fieldset>

        <br>

        <fieldset>
            <legend>Academic Information</legend>

            <label>College Name:</label><br>
            <input type="text" name="college" maxlength="50" required>
            <br><br>

            <label>SSC GPA:</label><br>
            <input type="text" name="ssc" required>
            <br><br>

            <label>HSC GPA:</label><br>
            <input type="text" name="hsc" required>
            <br><br>

            <label>Preferred Department:</label><br>

            <select name="department" required>
                <option value="">Select Department</option>
                <option>CSE</option>
                <option>CS</option>
                <option>EEE</option>
                <option>BBA</option>
                <option>English</option>
            </select>

        </fieldset>

        <br>

        <fieldset>
            <legend>Interests</legend>

            <input type="checkbox" name="interest" value="Programming">
            Programming
            <br>

            <input type="checkbox" name="interest" value="Robotics">
            Robotics
            <br>

            <input type="checkbox" name="interest" value="Sports">
            Sports
            <br>

            <input type="checkbox" name="interest" value="Music">
            Music

        </fieldset>

        <br>

        <fieldset>
            <legend>Upload Documents</legend>

            <label>Upload Transcript:</label><br>
            <input type="file" name="transcript" required>

        </fieldset>

        <br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
